hydra:
  run:
    dir: output/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}

experiment:
  project: "GPT_Small"
  run_name: "exp7_best_combo"

model:
  model_type: "gpt_split"
  split_mlp: true
  vocab_size: 50304
  block_size: 2048
  n_embd: 1024
  n_layers: 18
  n_heads: 8
  head_size: 128
  rope_head_size: 64
  kv_latent_size: 512
  q_latent_size: 4096

data:
  train_data_root: "data/edu_fineweb350B/"
  val_data_root: "data/edu_fineweb350B/"

training:
  batch_size: 32
  grad_accum_steps: 4
  logging_steps: 10
  checkpoint_interval: 4000
  generation_interval: 2000
  eval_interval: 250
  eval_steps: 40
  eval_batch_size: 16
  eval_block_size: 2048

  max_steps: 12000
  warmup_steps: 400
  max_lr: 2.0e-4
  min_lr: 2.0e-5
  use_muon: true
  muon_lr_scale: 100.0
  muon_wd: 0.0
  weight_decay: 0.1
