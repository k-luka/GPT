hydra:
  run:
    dir: output/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}

experiment:
  project: "GPT_Small"
  run_name: "M_muon"

model:
  vocab_size: 50304
  block_size: 2048
  n_embd: 2048
  n_layers: 24
  n_heads: 16
  head_size: 128
  rope_head_size: 64
  kv_latent_size: 512
  q_latent_size: 4096
  
  # # MoE Settings
  # n_shared_experts: 2
  # n_routed_experts: 40
  # topk_experts: 8
  # expert_hidden_size: 1024

data:
  train_data_root: "data/edu_fineweb350B/"
  val_data_root: "data/edu_fineweb350B/"

training:
  batch_size: 32
  grad_accum_steps: 4

  # Logistics
  logging_steps: 10
  checkpoint_interval: 8000
  generation_interval: 1000
  eval_interval: 500
  eval_steps: 80
  eval_batch_size: 16
  eval_block_size: 2048
  
  # Optimization
  max_steps: 40000
  warmup_steps: 800
  max_lr: 2.0e-4
  min_lr: 2.0e-5
  muon_lr_scale: 30.0
  weight_decay: 0.1
  
# resume_checkpoint: output/checkpoints/LM_2/best_val